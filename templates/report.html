<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据分析报告</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #f2f0fb;
      --surface: #ffffff;
      --surface-alt: #f7f7fc;
      --primary: #4f46e5;
      --primary-soft: rgba(79, 70, 229, 0.12);
      --green: #0f9d75;
      --green-soft: rgba(15, 157, 117, 0.12);
      --amber: #dd7a10;
      --amber-soft: rgba(221, 122, 16, 0.12);
      --red: #d9485f;
      --red-soft: rgba(217, 72, 95, 0.12);
      --text: #111827;
      --text-secondary: #4b5563;
      --text-muted: #9ca3af;
      --border: #e5e7eb;
      --shadow: 0 10px 30px rgba(17, 24, 39, 0.06);
      --radius: 18px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top left, #ffffff 0%, var(--bg) 55%, #ece9fb 100%);
      color: var(--text);
      line-height: 1.6;
    }
    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .header {
      padding: 28px 32px;
      margin-bottom: 20px;
      border-left: 4px solid var(--primary);
    }
    .eyebrow {
      color: var(--primary);
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 30px;
      line-height: 1.3;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--text-secondary);
      font-size: 14px;
    }
    .dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--text-muted);
      align-self: center;
    }
    .kpis {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }
    .kpi {
      padding: 18px 20px;
      position: relative;
      overflow: hidden;
    }
    .kpi::before {
      content: "";
      position: absolute;
      left: 20px;
      right: 20px;
      top: 0;
      height: 4px;
      border-radius: 0 0 4px 4px;
      background: linear-gradient(90deg, var(--primary), #8b5cf6);
    }
    .kpi-label {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 600;
      margin-bottom: 8px;
    }
    .kpi-value {
      font-size: 36px;
      font-weight: 800;
      line-height: 1.05;
      margin-bottom: 6px;
    }
    .kpi-sub {
      font-size: 13px;
      color: var(--text-secondary);
    }
    .kpi-trend {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-left: 8px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }
    .trend-up { background: var(--green-soft); color: var(--green); }
    .trend-down { background: var(--red-soft); color: var(--red); }
    .section {
      margin-bottom: 20px;
    }
    .section-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .section-icon {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 14px;
    }
    .section-head h2 {
      margin: 0;
      font-size: 21px;
    }
    .chart-card, .table-card, .findings-card, .list-card {
      padding: 18px 20px;
      min-width: 0;
    }
    .chart-grid {
      display: grid;
      grid-template-columns: minmax(280px, 340px) 1fr;
      gap: 14px;
    }
    .content-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      align-items: start;
    }
    .chart-title, .table-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 14px;
    }
    canvas {
      width: 100%;
      max-height: 300px;
    }
    .table-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .table-count {
      font-size: 12px;
      color: var(--text-muted);
    }
    .table-wrap {
      overflow-x: auto;
      overflow-y: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 12px 10px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      font-size: 14px;
    }
    th {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
    }
    td.num, th.num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .content-name {
      word-break: break-word;
      overflow-wrap: anywhere;
    }
    .article-bar-canvas {
      height: 360px !important;
      max-height: none;
    }
    .rank {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      background: var(--surface-alt);
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 800;
    }
    .rank.top {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: white;
    }
    .findings-group + .findings-group {
      margin-top: 20px;
    }
    .findings-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .findings-label::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--primary);
    }
    .finding-item {
      display: flex;
      gap: 12px;
      padding: 8px 0;
    }
    .finding-num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--primary-soft);
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 800;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .finding-text strong {
      color: var(--primary);
    }
    .details-toggle {
      margin-top: 8px;
      border: 0;
      background: none;
      color: var(--primary);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      padding: 0;
    }
    .details {
      display: none;
      margin-top: 10px;
      padding: 12px 14px;
      border-left: 3px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface-alt);
      color: var(--text-secondary);
      font-size: 13px;
      white-space: pre-wrap;
    }
    .details.show {
      display: block;
    }
    .risk-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 12px 14px;
      border-left: 3px solid var(--red);
      background: linear-gradient(90deg, var(--red-soft), rgba(255,255,255,0));
      border-radius: var(--radius-sm);
    }
    .risk-item + .risk-item,
    .cross-item + .cross-item {
      margin-top: 10px;
    }
    .risk-source {
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--red-soft);
      color: var(--red);
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
      margin-top: 2px;
    }
    .cross-item {
      padding: 12px 14px;
      border-left: 3px solid var(--primary);
      border-radius: var(--radius-sm);
      background: var(--primary-soft);
      color: var(--text-secondary);
      font-size: 14px;
    }
    footer {
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      padding: 18px 0 6px;
    }
    @media (max-width: 860px) {
      .kpis {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .chart-grid,
      .content-grid {
        grid-template-columns: 1fr;
      }
    }
    @media (max-width: 560px) {
      .container {
        padding: 20px 14px 32px;
      }
      .header, .chart-card, .table-card, .findings-card, .list-card {
        padding: 16px;
      }
      .kpis {
        grid-template-columns: 1fr;
      }
      h1 {
        font-size: 24px;
      }
      .kpi-value {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card header">
      <div class="eyebrow" id="headerEyebrow">数据分析报告</div>
      <h1 id="reportTitle">数据分析报告</h1>
      <div class="meta">
        <span id="reportDateRange"></span>
        <span class="dot"></span>
        <span id="reportAccount">平台数据</span>
      </div>
    </div>

    <div class="kpis" id="kpiGrid"></div>

    <div class="section">
      <div class="section-head">
        <div class="section-icon">趋势</div>
        <h2 id="readerTrendHeading">阅读趋势</h2>
      </div>
      <div class="card chart-card">
        <div class="chart-title" id="readerTrendChartTitle">每日阅读量与粉丝趋势</div>
        <canvas id="chartReaderTrend"></canvas>
      </div>
    </div>

    <div class="section" id="channelSection">
      <div class="section-head">
        <div class="section-icon">分发</div>
        <h2 id="channelSectionHeading">渠道与互动</h2>
      </div>
      <div class="chart-grid">
        <div class="card chart-card" id="channelPieCard">
          <div class="chart-title" id="channelPieTitle">阅读来源渠道分布</div>
          <canvas id="chartChannelPie"></canvas>
        </div>
        <div class="card chart-card" id="interactionTrendCard">
          <div class="chart-title" id="interactionChartTitle">每日分享与收藏</div>
          <canvas id="chartInteraction"></canvas>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-head">
        <div class="section-icon">内容</div>
        <h2 id="contentSectionHeading">文章表现</h2>
      </div>
      <div class="content-grid">
        <div class="card chart-card">
          <div class="chart-title" id="articleBarTitle">文章阅读量排名</div>
          <canvas id="chartArticleBar" class="article-bar-canvas"></canvas>
        </div>
        <div class="card table-card">
          <div class="table-head">
            <div class="table-title" id="articleTableTitle">文章明细</div>
            <div class="table-count" id="articleCount"></div>
          </div>
          <div class="table-wrap">
            <table id="articleTable">
              <thead>
                <tr>
                  <th>#</th>
                  <th id="contentColumnTitle">文章</th>
                  <th class="num" id="readersColumnTitle">阅读</th>
                  <th class="num" id="ratioColumnTitle">占比</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-head">
        <div class="section-icon">洞察</div>
        <h2>核心发现</h2>
      </div>
      <div class="card findings-card" id="findingsContainer"></div>
    </div>

    <div class="section">
      <div class="section-head">
        <div class="section-icon">风险</div>
        <h2>风险与建议</h2>
      </div>
      <div class="card list-card" id="risksContainer"></div>
    </div>

    <div class="section">
      <div class="section-head">
        <div class="section-icon">增长</div>
        <h2 id="userFlowHeading">用户增长趋势</h2>
      </div>
      <div class="card chart-card">
        <div class="chart-title" id="userFlowChartTitle">每日新增关注 vs 取消关注</div>
        <canvas id="chartUserFlow"></canvas>
      </div>
    </div>

    <div class="section" id="crossCheckSection" style="display:none;">
      <div class="section-head">
        <div class="section-icon">校验</div>
        <h2>交叉验证</h2>
      </div>
      <div class="card list-card" id="crossCheckContainer"></div>
    </div>

    <footer>
      由 <span id="footerProduct">WeChat Review</span> 生成 · <span id="generatedAt"></span>
    </footer>
  </div>

  <script>
    const REPORT_DATA = /*__REPORT_JSON__*/null;

    if (!REPORT_DATA) {
      document.body.innerHTML = '<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;color:#6b7280;">暂无数据，请先运行分析流程。</div>';
    } else {
      render(REPORT_DATA);
    }

    function render(report) {
      const meta = report.meta || {};
      const charts = report.charts || {};
      const sections = report.sections || {};
      const articleTable = report.articleTable || [];
      const crossCheck = report.crossCheck || [];

      document.getElementById('headerEyebrow').textContent = meta.reportEyebrow || '数据分析报告';
      document.getElementById('reportTitle').textContent = cleanEmoji(sections.overview && sections.overview.title || meta.reportTitle || '数据分析报告');
      document.getElementById('reportAccount').textContent = meta.platformName || '平台数据';
      document.getElementById('footerProduct').textContent = meta.footerProduct || 'WeChat Review';
      document.getElementById('generatedAt').textContent = new Date(report.generatedAt).toLocaleString('zh-CN');
      document.getElementById('reportDateRange').textContent = `${fmtDate(report.dateRange.start)} - ${fmtDate(report.dateRange.end)}`;

      applyPlatformLabels(meta, charts);
      buildKPIs(sections.overview && sections.overview.kpis || []);
      buildFindings(sections);
      buildRisks(sections.risksAndOpportunities && sections.risksAndOpportunities.risks || []);
      buildArticleTable(articleTable, meta);
      buildCrossCheck(crossCheck);
      renderCharts(charts);
    }

    function applyPlatformLabels(meta, charts) {
      const contentLabel = meta.contentLabel || '文章';
      const readerLabel = meta.readerLabel || '阅读';
      const audienceLabel = meta.audienceLabel || '粉丝';
      const channelLabel = meta.channelLabel || '渠道';

      document.getElementById('readerTrendHeading').textContent = `${readerLabel}趋势`;
      document.getElementById('readerTrendChartTitle').textContent = charts.readerTrend ? charts.readerTrend.title : `${readerLabel}趋势`;
      document.getElementById('channelSectionHeading').textContent = `${channelLabel}与互动`;
      document.getElementById('channelPieTitle').textContent = charts.channelPie ? charts.channelPie.title : `${channelLabel}分布`;
      document.getElementById('interactionChartTitle').textContent = charts.interactionTrend ? charts.interactionTrend.title : '每日分享与收藏';
      document.getElementById('contentSectionHeading').textContent = `${contentLabel}表现`;
      document.getElementById('articleBarTitle').textContent = charts.articleBar ? charts.articleBar.title : `${contentLabel}表现排名`;
      document.getElementById('articleTableTitle').textContent = `${contentLabel}明细`;
      document.getElementById('contentColumnTitle').textContent = contentLabel;
      document.getElementById('readersColumnTitle').textContent = readerLabel;
      document.getElementById('ratioColumnTitle').textContent = `${readerLabel}占比`;
      document.getElementById('userFlowHeading').textContent = `${audienceLabel}增长趋势`;
      document.getElementById('userFlowChartTitle').textContent = charts.userFlow ? charts.userFlow.title : `每日新增${audienceLabel} vs 取关`;

      const hasChannelData = charts.channelPie && Array.isArray(charts.channelPie.data) && charts.channelPie.data.some((value) => value > 0);
      if (!hasChannelData) {
        document.getElementById('channelPieCard').style.display = 'none';
        document.getElementById('interactionTrendCard').style.gridColumn = '1 / -1';
        document.getElementById('channelSectionHeading').textContent = '互动表现';
      }
    }

    function buildKPIs(kpis) {
      const grid = document.getElementById('kpiGrid');
      grid.innerHTML = '';

      kpis.forEach((kpi) => {
        const trendClass = kpi.trendValue && parseFloat(kpi.trendValue) >= 0 ? 'trend-up' : 'trend-down';
        const trend = kpi.trendValue ? `<span class="kpi-trend ${trendClass}">${kpi.trendValue}</span>` : '';
        grid.innerHTML += `
          <div class="card kpi">
            <div class="kpi-label">${kpi.label}</div>
            <div class="kpi-value">${formatValue(kpi.value)}</div>
            <div class="kpi-sub">${kpi.sub || ''} ${trend}</div>
          </div>`;
      });
    }

    function buildFindings(sections) {
      const container = document.getElementById('findingsContainer');
      container.innerHTML = '';
      const groups = [
        { key: 'growth', label: '增长洞察' },
        { key: 'content', label: '内容洞察' },
        { key: 'distribution', label: '分发洞察' },
      ];

      groups.forEach((group) => {
        const section = sections[group.key] || {};
        const findings = section.findings || [];
        if (findings.length === 0 && !section.details) {
          return;
        }

        let html = `<div class="findings-group"><div class="findings-label">${cleanEmoji(section.title || group.label)}</div>`;
        findings.forEach((finding, index) => {
          html += `
            <div class="finding-item">
              <div class="finding-num">${String(index + 1).padStart(2, '0')}</div>
              <div class="finding-text">${highlightNumbers(finding)}</div>
            </div>`;
        });

        if (section.details) {
          const detailId = `detail-${group.key}`;
          html += `
            <button class="details-toggle" onclick="toggleDetails('${detailId}', this)">查看详细分析</button>
            <div class="details" id="${detailId}">${section.details}</div>`;
        }

        html += '</div>';
        container.innerHTML += html;
      });

      if (!container.innerHTML) {
        container.innerHTML = '<div style="color:var(--text-muted);font-size:14px;">暂无专家洞察。</div>';
      }
    }

    function toggleDetails(id) {
      document.getElementById(id).classList.toggle('show');
    }

    function buildRisks(risks) {
      const container = document.getElementById('risksContainer');
      container.innerHTML = '';

      if (!risks.length) {
        container.innerHTML = '<div style="color:var(--text-muted);font-size:14px;">暂无风险提示。</div>';
        return;
      }

      risks.forEach((risk) => {
        container.innerHTML += `
          <div class="risk-item">
            <div class="risk-source">${risk.source}</div>
            <div>${risk.text}</div>
          </div>`;
      });
    }

    function buildArticleTable(articleTable, meta) {
      const tbody = document.querySelector('#articleTable tbody');
      const contentLabel = meta.contentLabel || '文章';
      tbody.innerHTML = '';
      document.getElementById('articleCount').textContent = `共 ${articleTable.length} 条${contentLabel}`;

      articleTable.forEach((item) => {
        const rankClass = item.rank <= 3 ? 'rank top' : 'rank';
        tbody.innerHTML += `
          <tr>
            <td><span class="${rankClass}">${item.rank}</span></td>
            <td>
              <div class="content-name">${item.title}</div>
              <div style="font-size:12px;color:var(--text-muted);margin-top:4px;">${item.pubDate || ''}</div>
            </td>
            <td class="num">${formatValue(item.readers)}</td>
            <td class="num">${item.readRatio || '—'}</td>
          </tr>`;
      });
    }

    function buildCrossCheck(crossCheck) {
      const section = document.getElementById('crossCheckSection');
      const container = document.getElementById('crossCheckContainer');
      container.innerHTML = '';

      if (!crossCheck.length) {
        section.style.display = 'none';
        return;
      }

      section.style.display = 'block';
      crossCheck.forEach((item) => {
        container.innerHTML += `<div class="cross-item">${item.note}</div>`;
      });
    }

    function renderCharts(charts) {
      Chart.defaults.color = '#6b7280';
      Chart.defaults.borderColor = '#eef2f7';
      Chart.defaults.font.family = "-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif";

      const palette = ['#4f46e5', '#d63384', '#0f9d75', '#dd7a10', '#0f766e', '#8b5cf6', '#d9485f'];
      const baseScales = {
        x: { grid: { display: false } },
        y: { beginAtZero: true, grid: { color: '#eef2f7' } },
      };

      if (charts.readerTrend) {
        const data = charts.readerTrend;
        new Chart(document.getElementById('chartReaderTrend'), {
          type: 'line',
          data: {
            labels: data.labels.map((label) => label.slice(5)),
            datasets: [
              {
                label: data.datasets[0].label,
                data: data.datasets[0].data,
                borderColor: palette[0],
                backgroundColor: 'rgba(79, 70, 229, 0.14)',
                fill: true,
                tension: 0.35,
                pointRadius: 0,
                yAxisID: 'y1',
              },
              {
                label: data.datasets[1].label,
                data: data.datasets[1].data,
                borderColor: '#9ca3af',
                borderDash: [5, 4],
                tension: 0.35,
                pointRadius: 0,
                fill: false,
                yAxisID: 'y2',
              },
            ],
          },
          options: {
            interaction: { mode: 'index', intersect: false },
            scales: {
              x: baseScales.x,
              y1: { ...baseScales.y, position: 'left' },
              y2: { ...baseScales.y, position: 'right', grid: { display: false } },
            },
          },
        });
      }

      if (charts.channelPie && charts.channelPie.data && charts.channelPie.data.some((value) => value > 0)) {
        new Chart(document.getElementById('chartChannelPie'), {
          type: 'doughnut',
          data: {
            labels: charts.channelPie.labels,
            datasets: [{
              data: charts.channelPie.data,
              backgroundColor: palette,
              borderWidth: 2,
              borderColor: '#fff',
            }],
          },
          options: {
            plugins: {
              legend: { position: 'bottom' },
            },
            cutout: '62%',
          },
        });
      }

      if (charts.interactionTrend) {
        const data = charts.interactionTrend;
        new Chart(document.getElementById('chartInteraction'), {
          type: 'line',
          data: {
            labels: data.labels.map((label) => label.slice(5)),
            datasets: data.datasets.map((set, index) => ({
              label: set.label,
              data: set.data,
              borderColor: palette[index + 2],
              backgroundColor: 'transparent',
              tension: 0.35,
              pointRadius: 0,
            })),
          },
          options: { scales: baseScales },
        });
      }

      if (charts.articleBar) {
        const articleBarCanvas = document.getElementById('chartArticleBar');
        articleBarCanvas.height = Math.max(300, charts.articleBar.labels.length * 34);
        new Chart(document.getElementById('chartArticleBar'), {
          type: 'bar',
          data: {
            labels: charts.articleBar.labels,
            datasets: [{
              label: charts.articleBar.title,
              data: charts.articleBar.data,
              backgroundColor: charts.articleBar.data.map((_, index) => index < 3 ? palette[0] : '#d1d5db'),
              borderRadius: 6,
            }],
          },
          options: {
            indexAxis: 'y',
            maintainAspectRatio: false,
            layout: {
              padding: { left: 8, right: 8, top: 4, bottom: 4 },
            },
            plugins: { legend: { display: false } },
            scales: {
              x: baseScales.x,
              y: {
                ...baseScales.y,
                grid: { display: false },
                ticks: {
                  autoSkip: false,
                  font: { size: 11 },
                  callback: (_, index) => shortenLabel(charts.articleBar.labels[index], 14),
                },
              },
            },
          },
        });
      }

      if (charts.userFlow) {
        const data = charts.userFlow;
        new Chart(document.getElementById('chartUserFlow'), {
          type: 'bar',
          data: {
            labels: data.labels.map((label) => label.slice(5)),
            datasets: [
              { label: data.datasets[0].label, data: data.datasets[0].data, backgroundColor: palette[2] },
              { label: data.datasets[1].label, data: data.datasets[1].data, backgroundColor: palette[6] },
            ],
          },
          options: {
            scales: {
              x: { stacked: true, grid: { display: false } },
              y: { stacked: true, beginAtZero: true, grid: { color: '#eef2f7' } },
            },
          },
        });
      }
    }

    function cleanEmoji(text) {
      return String(text || '').replace(/^[\u{1F300}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]\s*/u, '');
    }

    function fmtDate(dateStr) {
      if (!dateStr) return '';
      const date = new Date(`${dateStr}T00:00:00`);
      if (Number.isNaN(date.getTime())) return dateStr;
      return `${date.getFullYear()}.${String(date.getMonth() + 1).padStart(2, '0')}.${String(date.getDate()).padStart(2, '0')}`;
    }

    function formatValue(value) {
      return typeof value === 'number' ? value.toLocaleString() : value;
    }

    function highlightNumbers(text) {
      return String(text || '')
        .replace(/(\d+\.?\d*%)/g, '<strong>$1</strong>')
        .replace(/([\d,]+(?:\.\d+)?)(\s*(?:次|人|篇|天|%))/g, '<strong>$1</strong>$2');
    }

    function shortenLabel(text, maxLength) {
      const value = String(text || '');
      if (value.length <= maxLength) return value;
      return `${value.slice(0, maxLength)}...`;
    }
  </script>
</body>
</html>
